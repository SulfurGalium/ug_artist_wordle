<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rapper Wordle</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="alert-container" id="alert-container"></div>
<div class="confetti" id="confetti"></div>

<header>
  <h1>UNDERGROUNDARTISTLE!</h1>
  <p>guess the underground artist — 6 tries</p>
</header>

<div class="legend">
  <span><span class="dot correct"></span> Match</span>
  <span><span class="dot wrong"></span> No match</span>
</div>

<div class="input-area">
  <div class="input-wrap">
    <input type="text" id="guess-input" placeholder="Type a rapper name..." autocomplete="off" />
    <div class="suggestions" id="suggestions"></div>
  </div>
  <button class="guess-btn" id="guess-btn" onclick="submitGuess()">Guess</button>
  <button class="hint-btn" id="hint-btn" onclick="showHint()">Hint</button>
</div>
<div class="hint-text" id="hint-text">Need a clue? Tap hint and get a rapper fact.</div>

<div class="guesses-left" id="guesses-left"></div>

<div class="grid-wrap">
  <table id="guess-table">
    <thead>
      <tr>
        <th>Rapper</th>
        <th>Gender</th>
        <th>Genre</th>
        <th>Region</th>
        <th>Group</th>
        <th>Label type</th>
        <th>Followers</th>
      </tr>
    </thead>
    <tbody id="guess-body"></tbody>
  </table>
</div>

<button class="reset-btn" id="reset-btn" onclick="resetGame()">Play again</button>

<script src="script.js"></script>
</body>
</html>
