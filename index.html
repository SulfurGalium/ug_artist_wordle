<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UG Artistle - Daily Underground Artist Guessing Game</title>
<meta name="description" content="Play UG Artistle, a daily Wordle-style guessing game for underground artists. Use clues like genre, region, biggest collab, label type, and followers to find today's artist." />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="https://ugartistle.com/" />
<meta name="theme-color" content="#121213" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="UG Artistle" />
<meta property="og:title" content="UG Artistle - Daily Underground Artist Guessing Game" />
<meta property="og:description" content="A daily Wordle-style game for guessing underground artists from genre, region, biggest collab, label type, and follower clues." />
<meta property="og:url" content="https://ugartistle.com/" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="UG Artistle - Daily Underground Artist Guessing Game" />
<meta name="twitter:description" content="Guess today's underground artist in six tries." />
<link rel="stylesheet" href="styles.css" />
<script async data-cfasync="false" src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1796968030090599"
     crossorigin="anonymous"></script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "UG Artistle",
  "alternateName": "Undergroundartistle",
  "url": "https://ugartistle.com/",
  "applicationCategory": "GameApplication",
  "operatingSystem": "Any",
  "description": "A daily Wordle-style browser game where players guess an underground artist using clues like genre, region, biggest collab, label type, and followers.",
  "isAccessibleForFree": true,
  "inLanguage": "en",
  "publisher": {
    "@type": "Organization",
    "name": "UG Artistle",
    "url": "https://ugartistle.com/",
    "email": "contactugartistle@gmail.com"
  }
}
</script>
</head>
<body>

<div class="alert-container" id="alert-container"></div>
<div class="confetti" id="confetti"></div>

<header>
  <h1>UNDERGROUNDARTISTLE!</h1>
  <p>guess the underground artist — 6 tries</p>
</header>

<div class="ad-slot ad-slot-top" aria-label="Advertisement">
  <!-- banner-ad-top -->
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-1796968030090599"
       data-ad-slot="1058775265"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script data-cfasync="false">
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

<div class="legend">
  <span><span class="dot correct"></span> Match</span>
  <span><span class="dot partial"></span> Partial</span>
  <span><span class="dot wrong"></span> No match</span>
</div>

<div class="input-area">
  <div class="input-wrap">
    <input type="text" id="guess-input" placeholder="Type a rapper name..." autocomplete="off" />
    <div class="suggestions" id="suggestions"></div>
  </div>
  <button class="guess-btn" id="guess-btn" onclick="submitGuess()">Guess</button>
  <button class="hint-btn" id="hint-btn" onclick="showHint()">Hint</button>
</div>
<div class="hint-text" id="hint-text">Need a clue? Tap hint and get a rapper fact.</div>

<div class="guesses-left" id="guesses-left"></div>

<div class="grid-wrap">
  <table id="guess-table">
    <thead>
      <tr>
        <th>Rapper</th>
        <th>Genre</th>
        <th>Region</th>
        <th>Biggest Collab</th>
        <th>Label type</th>
        <th>Followers</th>
      </tr>
    </thead>
    <tbody id="guess-body"></tbody>
  </table>
</div>

<button class="reset-btn" id="reset-btn" onclick="resetGame('random')">Try random artist</button>

<footer class="site-footer">
  <a href="privacy.html">Privacy Policy</a>
  <a href="accessibility.html">Accessibility</a>
  <a href="mailto:contactugartistle@gmail.com">Contact</a>
</footer>

<script src="script.js"></script>
</body>
</html>
